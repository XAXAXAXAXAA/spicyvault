<script>
const API_BASE = "https://spicyvault-api.onrender.com";

const params = new URLSearchParams(window.location.search);
const userId = params.get("user_id");
const guildId = params.get("guild_id");

const generateBtn = document.getElementById("generateBtn");
const copyBtn = document.getElementById("copyBtn");
const keyWrap = document.getElementById("keyWrap");
const keyDisplay = document.getElementById("keyDisplay");
const statusEl = document.getElementById("status");
const metaEl = document.getElementById("meta");

let currentKey = "";

function setStatus(message, type = "") {
  statusEl.className = "kg-status" + (type ? ` ${type}` : "");
  statusEl.innerHTML = message;
}

function renderKey(code) {
  keyDisplay.innerHTML = "";
  [...code].forEach(ch => {
    const cell = document.createElement("div");
    cell.className = "kg-cell";
    cell.textContent = ch;
    keyDisplay.appendChild(cell);
  });
  keyWrap.classList.add("show");
}

generateBtn.addEventListener("click", async () => {
  if (!userId || !guildId) {
    setStatus("Missing user_id or guild_id in URL.", "err");
    return;
  }

  generateBtn.disabled = true;
  setStatus('<span class="spinner"></span>Generating your key...');

  try {
    const res = await fetch(`${API_BASE}/api/key/generate`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id: Number(userId)
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error("Failed to generate key.");
    }

    currentKey = data.code;
    renderKey(data.code);
    metaEl.textContent = `Expires at ${data.expires} UTC`;
    setStatus("Key generated successfully.", "ok");

  } catch (err) {
    setStatus(err.message || "Something went wrong.", "err");
  } finally {
    generateBtn.disabled = false;
  }
});

copyBtn.addEventListener("click", async () => {
  if (!currentKey) return;

  try {
    await navigator.clipboard.writeText(currentKey);
    copyBtn.textContent = "Copied!";
    setTimeout(() => {
      copyBtn.textContent = "Copy Key";
    }, 1200);
  } catch {
    copyBtn.textContent = "Copy Failed";
    setTimeout(() => {
      copyBtn.textContent = "Copy Key";
    }, 1200);
  }
});
</script>
